services:
  web:
    build:
      context: .
      dockerfile: docker/web/Dockerfile
    container_name: phpmon-web
    depends_on:
      - db
    environment:
      APP_URL: ${APP_URL:-http://localhost:8080}
      APP_NAME: ${APP_NAME:-My App}
      APP_DESC: ${APP_DESC:-Default edit me}
      DEBUG_MODE: ${DEBUG_MODE:-true}
      DB_HOST: ${DB_HOST:-db}
      DB_PORT: ${DB_PORT:-3306}
      DB_NAME: ${DB_NAME:-phpmon}
      DB_USER: ${DB_USER:-phpmon}
      DB_PASS: ${DB_PASS:-phpmon}
      LDAP_ENABLED: ${LDAP_ENABLED:-false}
      LDAP_HOST: ${LDAP_HOST:-}
      LDAP_PORT: ${LDAP_PORT:-636}
      LDAP_BASE_DN: ${LDAP_BASE_DN:-}
      LDAP_USERNAME: ${LDAP_USERNAME:-}
      LDAP_PASSWORD: ${LDAP_PASSWORD:-}
      LDAP_USE_SSL: ${LDAP_USE_SSL:-true}
      LDAP_USE_TLS: ${LDAP_USE_TLS:-false}
      LDAP_TIMEOUT: ${LDAP_TIMEOUT:-5}
      LDAP_DOMAIN: ${LDAP_DOMAIN:-}
      LDAP_USER_FILTER_ATTRIBUTE: ${LDAP_USER_FILTER_ATTRIBUTE:-samaccountname}
      LDAP_TLS_REQUIRE_CERT: ${LDAP_TLS_REQUIRE_CERT:-true}
      MAIL_ENABLED: ${MAIL_ENABLED:-false}
      MAILER_DSN: ${MAILER_DSN:-}
      MAIL_FROM_ADDRESS: ${MAIL_FROM_ADDRESS:-}
      MAIL_FROM_NAME: ${MAIL_FROM_NAME:-Rockdesk}
      INBOUND_MAIL_ADDRESS: ${INBOUND_MAIL_ADDRESS:-}
      INBOUND_MAIL_PLUS_ADDRESSING_ENABLED: ${INBOUND_MAIL_PLUS_ADDRESSING_ENABLED:-false}
      INBOUND_MAIL_PLUS_DELIMITER: ${INBOUND_MAIL_PLUS_DELIMITER:-+}
    ports:
      - "8080:80"

  db:
    image: mariadb:11.4
    container_name: phpmon-db
    restart: unless-stopped
    environment:
      MARIADB_DATABASE: ${DB_NAME:-phpmon}
      MARIADB_USER: ${DB_USER:-phpmon}
      MARIADB_PASSWORD: ${DB_PASS:-phpmon}
      MARIADB_ROOT_PASSWORD: ${DB_ROOT_PASS:-root}
    ports:
      - "3307:3306"
    volumes:
      - mariadb_data:/var/lib/mysql

volumes:
  mariadb_data:
